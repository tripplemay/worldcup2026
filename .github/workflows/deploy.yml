name: Deploy — 世界杯 App → 2026.vpanel.cc

# 同机复用 nextpanel 生产 VPS,严格隔离(端口 3100 / 目录 worldcup / 独立 nginx+证书+pm2)。
# CI 构建 standalone 产物,VPS 只跑不构建(保护内存偏紧的生产机)。

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: 构建(standalone)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - name: 打包产物(standalone + static + public)
        run: |
          mkdir -p deploy/.next
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          tar czf deploy.tar.gz -C deploy .
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
      - name: 传产物到 VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.tar.gz
          target: /tmp/worldcup-deploy
      - name: VPS 部署(解包 + 首次配 nginx/证书 + pm2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 15m
          envs: DOMAIN,CERTBOT_EMAIL,ODDS_API_KEY,ODDS_API_KEYS
          script: |
            set -e
            APP_DIR=/opt/apps/worldcup
            PORT=3100
            SETUP_DONE=/opt/.worldcup_setup_done

            # ── 解包产物(VPS 只跑不构建)──
            rm -rf "$APP_DIR" && mkdir -p "$APP_DIR"
            tar xzf /tmp/worldcup-deploy/deploy.tar.gz -C "$APP_DIR"
            rm -rf /tmp/worldcup-deploy

            # ── 首次:独立 Nginx server block + 证书(幂等,绝不碰 nextpanel)──
            if [ ! -f "$SETUP_DONE" ]; then
              cat > /etc/nginx/sites-available/worldcup <<NGINX
            server {
              listen 80;
              server_name ${DOMAIN};
              location / {
                proxy_pass http://127.0.0.1:${PORT};
                proxy_http_version 1.1;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection upgrade;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_cache_bypass \$http_upgrade;
              }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/worldcup /etc/nginx/sites-enabled/
              nginx -t && systemctl reload nginx
              certbot --nginx -d "${DOMAIN}" --non-interactive --agree-tos -m "${CERTBOT_EMAIL}"
              touch "$SETUP_DONE"
            fi

            # ── 运行时环境(standalone server.js 只读 process.env,不读 .env 文件)──
            # ODDS_API_KEY / ODDS_API_KEYS 均可逗号分隔多个 key,代码合并去重轮换
            export ODDS_API_KEY="${ODDS_API_KEY}"
            export ODDS_API_KEYS="${ODDS_API_KEYS}"
            export ODDS_API_BASE="https://api.the-odds-api.com/v4"
            export ODDS_API_REGIONS="eu"
            export ODDS_API_ODDS_FORMAT="decimal"
            export ESPN_BASE="https://site.api.espn.com/apis"
            export PORT="$PORT"
            export HOSTNAME="127.0.0.1"
            export NODE_ENV="production"

            # ── pm2 启动(独立进程 worldcup,端口 3100)──
            cd "$APP_DIR"
            pm2 delete worldcup 2>/dev/null || true
            pm2 start server.js --name worldcup --update-env
            pm2 save

            echo ">>> 部署完成 — https://${DOMAIN}"
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
