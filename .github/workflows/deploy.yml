name: Deploy — 世界杯 App → 2026.vpanel.cc

# 同机复用 nextpanel 生产 VPS,严格隔离(端口 3100 / 目录 worldcup / 独立 nginx+证书+pm2)。
# CI 构建 standalone 产物,VPS 只跑不构建(保护内存偏紧的生产机)。

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: 构建(standalone)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - name: 打包产物(standalone + static + public)
        run: |
          mkdir -p deploy/.next
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          # 联赛回测种子数据(随产物带上,VPS 部署时播种到数据目录,供 /backtest 调参)
          [ -d seed ] && cp -r seed deploy/seed || true
          tar czf deploy.tar.gz -C deploy .
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
      - name: 传产物到 VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp/worldcup-deploy
      - name: VPS 部署(解包 + 首次配 nginx/证书 + pm2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          envs: DOMAIN,CERTBOT_EMAIL,ODDS_API_KEY,ODDS_API_KEYS,ODDS_API_IO_KEY,ADMIN_TOKEN,AIGC_API_KEY,API_FOOTBALL_KEY,TG_BOT_TOKEN,TG_ADMIN_CHAT_ID,TG_WEBHOOK_SECRET,PNL_VIEW_PASSWORD,PNL_ADMIN_PASSWORD,WX_BOT_TOKEN,WX_BASE_URL,WX_ADMIN_USER
          script: |
            set -e
            APP_DIR=/opt/apps/worldcup
            STAGING="${APP_DIR}.new"
            PORT=3100
            SETUP_DONE=/opt/.worldcup_setup_done

            # ── 解包到暂存目录(旧进程继续正常服务旧文件,避免边删边读导致白屏)──
            rm -rf "$STAGING" && mkdir -p "$STAGING"
            tar xzf /tmp/worldcup-deploy/deploy.tar.gz -C "$STAGING"
            rm -rf /tmp/worldcup-deploy

            # ── 首次:独立 Nginx server block + 证书(幂等,绝不碰 nextpanel)──
            if [ ! -f "$SETUP_DONE" ]; then
              cat > /etc/nginx/sites-available/worldcup <<NGINX
            server {
              listen 80;
              server_name ${DOMAIN};
              location / {
                proxy_pass http://127.0.0.1:${PORT};
                proxy_http_version 1.1;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection upgrade;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_cache_bypass \$http_upgrade;
              }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/worldcup /etc/nginx/sites-enabled/
              nginx -t && systemctl reload nginx
              certbot --nginx -d "${DOMAIN}" --non-interactive --agree-tos -m "${CERTBOT_EMAIL}"
              touch "$SETUP_DONE"
            fi

            # ── 运行时环境(standalone server.js 只读 process.env,不读 .env 文件)──
            # ODDS_API_KEY / ODDS_API_KEYS 均可逗号分隔多个 key,代码合并去重轮换
            export ODDS_API_KEY="${ODDS_API_KEY}"
            export ODDS_API_KEYS="${ODDS_API_KEYS}"
            export ODDS_API_BASE="https://api.the-odds-api.com/v4"
            export ODDS_API_REGIONS="eu"
            export ODDS_API_ODDS_FORMAT="decimal"
            # 实时赔率第二数据源 odds-api.io(100次/小时,后台轮询动态配速);未设则实时看板优雅留空
            # 其余 BASE/LEAGUE/BOOKMAKERS(=Bet365)/LIVE_COUNT 等用代码默认,无需在此设
            export ODDS_API_IO_KEY="${ODDS_API_IO_KEY}"
            export ESPN_BASE="https://site.api.espn.com/apis"
            # 前端添加的 key 持久化到部署目录之外(rm -rf APP_DIR 不会清掉它)
            DATA_DIR=/opt/apps/worldcup-data
            mkdir -p "$DATA_DIR"
            export ODDS_KEYS_FILE="$DATA_DIR/odds-keys.json"
            # ── 联赛回测数据播种(seed 为唯一真相源,覆盖同步;prod 不自生成 league-* 故安全)──
            # 工作流:本地 ingest → 刷新 seed/leagues/ → redeploy 覆盖到 prod 数据目录。
            mkdir -p "$DATA_DIR/predict"
            if [ -d "$STAGING/seed/leagues" ]; then
              cp -f "$STAGING/seed/leagues/"*.json "$DATA_DIR/predict/" 2>/dev/null || true
            fi
            # 预测系统数据目录(历史/评分 JSON,部署不丢)
            export WC_DATA_DIR="$DATA_DIR"
            # 管理员口令(前端 key 管理鉴权;未设则该功能禁用)
            export ADMIN_TOKEN="${ADMIN_TOKEN}"
            # Phase 3 场外情报 LLM(AIGC 网关);未设 AIGC_API_KEY 则情报功能禁用
            export AIGC_API_KEY="${AIGC_API_KEY}"
            export AIGC_BASE="https://aigc.guangai.ai/v1"
            export INTEL_LLM_MODEL="gpt-5.5"
            # Phase 9 投注单识别(Telegram bot + 视觉 LLM);未设 TG_* 则 webhook 禁用
            export TG_BOT_TOKEN="${TG_BOT_TOKEN}"
            export TG_ADMIN_CHAT_ID="${TG_ADMIN_CHAT_ID}"
            export TG_WEBHOOK_SECRET="${TG_WEBHOOK_SECRET}"
            # 盈亏页浏览密码(fail-closed:未设则盈亏页/接口一律拒绝)
            export PNL_VIEW_PASSWORD="${PNL_VIEW_PASSWORD}"
            # 盈亏页管理密码(看/改分权:配置后浏览密码降为只读,改账需管理密码;未设则浏览密码仍可改)
            export PNL_ADMIN_PASSWORD="${PNL_ADMIN_PASSWORD}"
            # 微信接入(wx-link;未设 WX_BOT_TOKEN 则微信轮询不启动)。WX_BASE_URL 缺省 iLink 域;
            # WX_ADMIN_USER 可选:不设则收所有私聊发送者(接入靠 QR 管控),设了(逗号分隔)才只收名单内。
            export WX_BOT_TOKEN="${WX_BOT_TOKEN}"
            export WX_BASE_URL="${WX_BASE_URL}"
            export WX_ADMIN_USER="${WX_ADMIN_USER}"
            # 视觉识别模型代码默认 gpt-5.5;如需单独覆盖再设 BETS_VISION_MODEL
            # 预置投注人名册(逗号分隔;名册为空时首次写入):export BET_TRACKER_BETTORS="张三,李四"
            # 预测数据源:API-Football(付费 Pro);未设则历史摄取跳过
            export API_FOOTBALL_KEY="${API_FOOTBALL_KEY}"
            export API_FOOTBALL_BASE="https://v3.football.api-sports.io"
            export PORT="$PORT"
            export HOSTNAME="127.0.0.1"
            export NODE_ENV="production"

            # ── 原子切换 + 重启(停机仅 = 新进程启动时间;文件替换瞬间完成)──
            pm2 delete worldcup 2>/dev/null || true
            rm -rf "${APP_DIR}.old"
            if [ -d "$APP_DIR" ]; then mv "$APP_DIR" "${APP_DIR}.old"; fi
            mv "$STAGING" "$APP_DIR"
            cd "$APP_DIR"
            pm2 start server.js --name worldcup --update-env
            pm2 save
            rm -rf "${APP_DIR}.old"

            # ── Phase 9:注册 Telegram webhook(幂等;未配 TG_* 则跳过)──
            if [ -n "${TG_BOT_TOKEN}" ] && [ -n "${TG_WEBHOOK_SECRET}" ]; then
              curl -s --max-time 20 "https://api.telegram.org/bot${TG_BOT_TOKEN}/setWebhook" \
                -d "url=https://${DOMAIN}/api/tg/webhook" \
                -d "secret_token=${TG_WEBHOOK_SECRET}" \
                -d 'allowed_updates=["message","callback_query"]' >/dev/null 2>&1 || true
            fi

            # ── 预测引擎:首次播种评分 + 每日刷新 cron(纯 ESPN,免费)──
            if [ -n "${ADMIN_TOKEN}" ]; then
              sleep 5
              curl -s --max-time 280 -X POST -H "x-admin-token: ${ADMIN_TOKEN}" \
                "http://127.0.0.1:${PORT}/api/worldcup/engine?days=14" >/dev/null 2>&1 || true
              if command -v crontab >/dev/null 2>&1; then
                ( crontab -l 2>/dev/null | grep -v 'worldcup/engine' | grep -v 'worldcup/intel' | grep -v 'worldcup/trade' | grep -v 'worldcup/odds' | grep -v 'worldcup/scenarios' | grep -v 'worldcup/research'; \
                  echo "30 4 * * * curl -s --max-time 280 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/engine?days=14' >/dev/null 2>&1 # worldcup-predict"; \
                  echo "0 */2 * * * curl -s --max-time 280 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/intel?hours=36' >/dev/null 2>&1 # worldcup-intel"; \
                  echo "*/15 * * * * curl -s --max-time 110 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/trade/run' >/dev/null 2>&1 # worldcup-trade"; \
                  echo "10 4 * * * curl -s --max-time 120 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/odds/capture-openings' >/dev/null 2>&1 # worldcup-openings"; \
                  echo "*/20 * * * * curl -s --max-time 290 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/scenarios/run' >/dev/null 2>&1 # worldcup-scenarios"; \
                  echo "35 4 * * * curl -s --max-time 110 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/research/ingest' >/dev/null 2>&1 # worldcup-research-ingest"; \
                  echo "45 4 * * * curl -s --max-time 290 -X POST -H 'x-admin-token: ${ADMIN_TOKEN}' 'http://127.0.0.1:${PORT}/api/worldcup/research/run' >/dev/null 2>&1 # worldcup-research" \
                ) | crontab -
              fi
              # 首次播种情报
              curl -s --max-time 200 -X POST -H "x-admin-token: ${ADMIN_TOKEN}" \
                "http://127.0.0.1:${PORT}/api/worldcup/intel?hours=48" >/dev/null 2>&1 || true
              # 沙盘情景推演:部署后立即算一份(engine 已先播种评分/Elo)
              curl -s --max-time 290 -X POST -H "x-admin-token: ${ADMIN_TOKEN}" \
                "http://127.0.0.1:${PORT}/api/worldcup/scenarios/run" >/dev/null 2>&1 || true
              # 研究调参:部署后立即跑一轮(seed 联赛数据已播种到数据目录)。
              # 不带 force:内核网格版本过期时 runner 自会绕过同日幂等立即强刷;
              # 数据/网格都没变的日常部署则整体幂等跳过(不做无谓的全量重跑)。
              curl -s --max-time 290 -X POST -H "x-admin-token: ${ADMIN_TOKEN}" \
                "http://127.0.0.1:${PORT}/api/worldcup/research/run" >/dev/null 2>&1 || true
            fi

            echo ">>> 部署完成 — https://${DOMAIN}"
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          AIGC_API_KEY: ${{ secrets.AIGC_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_ADMIN_CHAT_ID: ${{ secrets.TG_ADMIN_CHAT_ID }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
          PNL_VIEW_PASSWORD: ${{ secrets.PNL_VIEW_PASSWORD }}
          PNL_ADMIN_PASSWORD: ${{ secrets.PNL_ADMIN_PASSWORD }}
          WX_BOT_TOKEN: ${{ secrets.WX_BOT_TOKEN }}
          WX_BASE_URL: ${{ secrets.WX_BASE_URL }}
          WX_ADMIN_USER: ${{ secrets.WX_ADMIN_USER }}
